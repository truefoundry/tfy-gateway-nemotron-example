# Creates a virtual model "nemotron-routing/nemotron" that routes:
#   - All traffic → Nemotron Super (priority 1, 120B reasoning model)
#   - Auto-fallback → Nemotron Nano (priority 2, 4B fast model) on 429/5xx
#
# Docs: https://docs.truefoundry.com/gateway/load-balancing-overview
#
# Usage:
#   tfy apply -f routing.yaml  (run after gateway.yaml)

name: nemotron-routing
type: provider-account/virtual-model
collaborators:
  - role_id: provider-account-access
    subject: "team:everyone"
integrations:
  - name: nemotron
    type: integration/model/virtual
    model_types:
      - chat
    routing_config:
      type: priority-based-routing
      load_balance_targets:
        - target: "nvidia-nim/nemotron-super"
          priority: 1
          fallback_candidate: true
        - target: "nvidia-nim/nemotron-nano"
          priority: 2
          fallback_candidate: true
      fallback:
        codes: [429, 500, 502, 503]
