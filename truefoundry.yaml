# Deploys the FastAPI service on TrueFoundry.
# Docs: https://docs.truefoundry.com/docs/deploy-first-service
#
# Usage:
#   tfy deploy -f truefoundry.yaml --no-wait

name: nemotron-gateway-demo
type: service
image:
  type: build
  build_source:
    type: local
  build_spec:
    type: dockerfile
    dockerfile_path: Dockerfile
ports:
  - port: 8000
    expose: true
    app_protocol: http
resources:
  cpu_request: 0.5
  cpu_limit: 1
  memory_request: 512
  memory_limit: 1024
  ephemeral_storage_request: 1000
  ephemeral_storage_limit: 2000
env:
  TFY_BASE_URL: "https://<your-org>.truefoundry.cloud"
  # Use a Virtual Access Token (VAT) in production — docs: https://docs.truefoundry.com/docs/generating-truefoundry-api-keys
  TFY_API_KEY: "tfy-secret://<tenant>:<secret-group>:TFY-API-KEY"
  GATEWAY_MODEL: "nemotron-routing/nemotron"
replicas: 1
workspace_fqn: "<your-workspace-fqn>"
